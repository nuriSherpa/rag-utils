<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>rag-utils</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 260px;
        padding: 14px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      p {
        font-size: 11px;
        color: #777;
        margin: 0 0 10px;
        line-height: 1.4;
      }
      #status {
        font-size: 12px;
        color: #333;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
        flex-shrink: 0;
      }
      .dot.online {
        background: #2ecc71;
      }
      .dot.offline {
        background: #e74c3c;
      }
    </style>
  </head>
  <body>
    <h1>rag-utils</h1>
    <p>
      Open a chatbot page (Claude, ChatGPT, Gemini). The side panel appears automatically as you
      type.
    </p>
    <div id="status">
      <span class="dot"></span>
      <span id="status-text">Checking server…</span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
