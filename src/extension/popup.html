<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>rag-utils</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 240px;
        padding: 12px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      #status {
        font-size: 12px;
        color: #555;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        background: #ccc;
      }
      .dot.online {
        background: #2ecc71;
      }
      .dot.offline {
        background: #e74c3c;
      }
    </style>
  </head>
  <body>
    <h1>rag-utils</h1>
    <div id="status"><span class="dot"></span><span id="status-text">Checking server...</span></div>
    <script src="popup.js"></script>
  </body>
</html>
